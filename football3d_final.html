<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Football 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
#c { width:100%; height:100%; touch-action:none; display:block; }
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:center; align-items:center; gap:40px;
  padding:10px 20px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);
  pointer-events:none; z-index:10;
}
.tscore { text-align:center; }
.tlabel { font-size:11px; color:rgba(255,255,255,0.55); letter-spacing:1px; text-transform:uppercase; }
.tnum   { font-size:50px; font-weight:700; color:#fff; line-height:1; }
#clock  { font-size:22px; color:#fff; font-weight:500; padding-top:16px; min-width:64px; text-align:center; }
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.82);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:20; color:#fff;
}
#overlay h1 { font-size:38px; font-weight:700; margin-bottom:10px; }
#overlay .sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
#overlay button {
  margin-top:22px; padding:13px 40px;
  background:#fff; color:#111; border:none; border-radius:9px;
  font-size:16px; font-weight:600; cursor:pointer;
}
#overlay button:hover { background:#ddd; }
#goalbanner {
  position:fixed; inset:0; display:none; pointer-events:none;
  align-items:center; justify-content:center; z-index:15;
}
#goalbanner span {
  font-size:90px; font-weight:900; color:#fff;
  text-shadow:0 0 60px rgba(255,210,0,1), 0 0 20px rgba(0,0,0,0.8);
  animation:pop .25s ease-out;
}
@keyframes pop { from{transform:scale(0.3);opacity:0} 70%{transform:scale(1.1)} to{transform:scale(1);opacity:1} }
#hint {
  position:fixed; bottom:10px; left:0; right:0;
  text-align:center; font-size:11px; color:rgba(255,255,255,0.3);
  pointer-events:none; z-index:10;
}
#loading {
  position:fixed; inset:0; background:rgba(0,0,0,0.9);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:30; color:#fff; gap:16px;
}
#loading p { font-size:16px; opacity:0.7; }
#loadbar { width:280px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; }
#loadfill { height:100%; width:5%; background:#fff; border-radius:2px; transition:width 0.3s; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="loading">
  <p id="loadtxt">טוען אצטדיון...</p>
  <div id="loadbar"><div id="loadfill"></div></div>
</div>

<div id="hud">
  <div class="tscore"><div class="tlabel">🔵 Home</div><div class="tnum" id="s1">0</div></div>
  <div id="clock">2:00</div>
  <div class="tscore"><div class="tlabel">Away 🔴</div><div class="tnum" id="s2">0</div></div>
</div>
<div id="goalbanner"><span>⚽ GOAL!</span></div>
<div id="overlay" style="display:none">
  <h1 id="ovtitle">⚽ Football 3D</h1>
  <p class="sub">🎮 שלט Xbox: ג'ויסטיק שמאלי לזוז • B לתפוס/לבעוט</p>
  <p class="sub">⌨️ WASD + Space (שחקן 1) | חצים + Enter (שחקן 2)</p>
  <button id="startBtn">התחל משחק</button>
</div>
<div id="hint">🎮 Stick לזוז • B לבעוט • גלגלת עכבר לזום</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/cannon.js"></script>
<script>
const canvas = document.getElementById('c');
const engine = new BABYLON.Engine(canvas, true);
const scene  = new BABYLON.Scene(engine);
scene.enablePhysics(new BABYLON.Vector3(0,-9.81,0), new BABYLON.CannonJSPlugin());
scene.clearColor = new BABYLON.Color4(0.05,0.08,0.15,1);

// Camera
const cam = new BABYLON.ArcRotateCamera("cam",-Math.PI/2,Math.PI/3.5,85,BABYLON.Vector3.Zero(),scene);
cam.lowerRadiusLimit=35; cam.upperRadiusLimit=140;
cam.upperBetaLimit=Math.PI/2.1; cam.wheelPrecision=4;
cam.attachControl(canvas,true);

// Lights
const hemi = new BABYLON.HemisphericLight("h",new BABYLON.Vector3(0,1,0),scene);
hemi.intensity=0.6; hemi.groundColor=new BABYLON.Color3(0.1,0.15,0.1);
[[-57,-42],[57,-42],[57,42],[-57,42]].forEach(([x,z])=>{
  const sl=new BABYLON.SpotLight("fl"+x+z,new BABYLON.Vector3(x,42,z),
    new BABYLON.Vector3(-x*0.025,-1,-z*0.025).normalize(),Math.PI/2.6,1.1,scene);
  sl.intensity=600; sl.diffuse=new BABYLON.Color3(1,0.97,0.88);
});

// Ground physics
const gnd=BABYLON.MeshBuilder.CreateBox("gnd",{width:200,height:0.2,depth:200},scene);
gnd.position.y=-0.1; gnd.isVisible=false;
gnd.physicsImpostor=new BABYLON.PhysicsImpostor(gnd,BABYLON.PhysicsImpostor.BoxImpostor,{mass:0,restitution:0.4,friction:0.6},scene);

// Wall colliders
function wall(x,y,z,w,h,d){
  const m=BABYLON.MeshBuilder.CreateBox("w"+Math.random().toFixed(5),{width:w,height:h,depth:d},scene);
  m.position.set(x,y,z); m.isVisible=false;
  m.physicsImpostor=new BABYLON.PhysicsImpostor(m,BABYLON.PhysicsImpostor.BoxImpostor,{mass:0,restitution:0.4},scene);
}
wall(0,2,-35.5,115,4,0.3);
wall(0,2,35.5,115,4,0.3);
wall(-54,2,0,0.3,4,72);
wall(54,2,0,0.3,4,72);

// Ball
const ballMesh=BABYLON.MeshBuilder.CreateSphere("ball",{diameter:0.44,segments:14},scene);
const bm=new BABYLON.StandardMaterial("bm",scene);
bm.diffuseColor=new BABYLON.Color3(0.95,0.95,0.92);
bm.specularColor=new BABYLON.Color3(0.3,0.3,0.3);
ballMesh.material=bm;
ballMesh.position.set(0,0.3,0);
ballMesh.physicsImpostor=new BABYLON.PhysicsImpostor(
  ballMesh,BABYLON.PhysicsImpostor.SphereImpostor,{mass:0.45,restitution:0.65,friction:0.5},scene);
const pm2=new BABYLON.StandardMaterial("pm2",scene);
pm2.diffuseColor=new BABYLON.Color3(0.08,0.08,0.08);
for(let i=0;i<5;i++){
  const a=(i/5)*Math.PI*2;
  const p=BABYLON.MeshBuilder.CreateBox("bp"+i,{width:0.09,height:0.07,depth:0.09},scene);
  p.position.set(Math.cos(a)*0.18,0.3,Math.sin(a)*0.18);
  p.material=pm2; p.isPickable=false;
}

// Players
function makePlayer(colorHex,name){
  const root=new BABYLON.TransformNode(name,scene);
  const cm=new BABYLON.StandardMaterial(name+"cm",scene);
  cm.diffuseColor=BABYLON.Color3.FromHexString(colorHex);
  const sm=new BABYLON.StandardMaterial(name+"sm",scene);
  sm.diffuseColor=new BABYLON.Color3(0.94,0.76,0.58);
  const body=BABYLON.MeshBuilder.CreateCapsule(name+"b",{height:1.6,radius:0.33,tessellation:8},scene);
  body.position.set(0,0.95,0); body.material=cm; body.parent=root;
  const head=BABYLON.MeshBuilder.CreateSphere(name+"h",{diameter:0.52,segments:8},scene);
  head.position.set(0,1.9,0); head.material=sm; head.parent=root;
  const dot=BABYLON.MeshBuilder.CreateSphere(name+"d",{diameter:0.2},scene);
  dot.position.set(0,2.6,0); dot.material=cm; dot.parent=root;
  return root;
}
const p1mesh=makePlayer("#3B82F6","p1");
const p2mesh=makePlayer("#EF4444","p2");

// Game state
let score=[0,0],timeLeft=120,matchRunning=false,processingGoal=false,timerInt=null;
function updateHUD(){
  document.getElementById('s1').textContent=score[0];
  document.getElementById('s2').textContent=score[1];
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('clock').textContent=m+':'+(s<10?'0':'')+s;
}
function showGoal(cb){
  const b=document.getElementById('goalbanner');
  b.style.display='flex';
  setTimeout(()=>{b.style.display='none';cb();},2500);
}

// Input
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','Enter','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

const DEAD=0.15;
function getInput(idx){
  const gps=[...navigator.getGamepads()].filter(Boolean);
  const gp=gps[idx]||null;
  let ax=0,ay=0,bDown=false;
  if(gp){
    ax=Math.abs(gp.axes[0])>DEAD?gp.axes[0]:0;
    ay=Math.abs(gp.axes[1])>DEAD?gp.axes[1]:0;
    bDown=!!(gp.buttons[1]&&gp.buttons[1].pressed);
  }
  if(idx===0){
    if(!gp||(!ax&&!ay)){if(keys['KeyA'])ax=-1;if(keys['KeyD'])ax=1;if(keys['KeyW'])ay=-1;if(keys['KeyS'])ay=1;}
    bDown=bDown||!!keys['Space'];
  } else {
    if(!gp||(!ax&&!ay)){if(keys['ArrowLeft'])ax=-1;if(keys['ArrowRight'])ax=1;if(keys['ArrowUp'])ay=-1;if(keys['ArrowDown'])ay=1;}
    bDown=bDown||!!keys['Enter'];
  }
  const mag=Math.hypot(ax,ay);if(mag>1){ax/=mag;ay/=mag;}
  return{ax,ay,bDown};
}

const SPEED=9,CARRY=0.88,KICK=22,KCD=28;
const pMesh=[p1mesh,p2mesh];
const pSt=[
  {hasBall:false,cd:0,dx:0,dz:1,bWas:false},
  {hasBall:false,cd:0,dx:0,dz:-1,bWas:false}
];

function resetAll(){
  pMesh[0].position.set(-12,0,0); pMesh[1].position.set(12,0,0);
  pSt[0].hasBall=false;pSt[0].cd=0;pSt[1].hasBall=false;pSt[1].cd=0;
  ballMesh.physicsImpostor.setLinearVelocity(BABYLON.Vector3.Zero());
  ballMesh.physicsImpostor.setAngularVelocity(BABYLON.Vector3.Zero());
  ballMesh.position.set(0,0.3,0);
}

scene.registerBeforeRender(()=>{
  if(!matchRunning||processingGoal) return;
  const dt=engine.getDeltaTime()/1000;
  for(let i=0;i<2;i++){
    const p=pMesh[i],ps=pSt[i];
    const{ax,ay,bDown}=getInput(i);
    p.position.x=Math.max(-51,Math.min(51,p.position.x+ax*SPEED*dt));
    p.position.z=Math.max(-33,Math.min(33,p.position.z+ay*SPEED*dt));
    p.position.y=0;
    if(Math.hypot(ax,ay)>0.1){ps.dx=ax;ps.dz=ay;}
    p.rotation.y=Math.atan2(ps.dx,ps.dz);
    if(ps.cd>0)ps.cd--;
    const bPressed=bDown&&!ps.bWas; ps.bWas=bDown;
    if(bPressed&&ps.cd===0){
      if(ps.hasBall){
        ps.hasBall=false;
        ballMesh.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(ps.dx*KICK,4,ps.dz*KICK));
        ps.cd=KCD;
      } else {
        const d=Math.hypot(ballMesh.position.x-p.position.x,ballMesh.position.z-p.position.z);
        if(d<2.0&&!pSt[0].hasBall&&!pSt[1].hasBall) ps.hasBall=true;
      }
    }
    if(!ps.hasBall&&ps.cd===0){
      const d=Math.hypot(ballMesh.position.x-p.position.x,ballMesh.position.z-p.position.z);
      if(d<1.0&&!pSt[0].hasBall&&!pSt[1].hasBall) ps.hasBall=true;
    }
    if(ps.hasBall){
      ballMesh.physicsImpostor.setLinearVelocity(BABYLON.Vector3.Zero());
      ballMesh.physicsImpostor.setAngularVelocity(BABYLON.Vector3.Zero());
      ballMesh.position.set(p.position.x+ps.dx*CARRY,0.3,p.position.z+ps.dz*CARRY);
    }
  }
  for(let i=0;i<2;i++){
    const j=1-i;
    if(pSt[j].hasBall&&pSt[i].cd===0){
      const d=Math.hypot(pMesh[i].position.x-pMesh[j].position.x,pMesh[i].position.z-pMesh[j].position.z);
      if(d<1.5){pSt[j].hasBall=false;pSt[i].hasBall=true;pSt[j].cd=30;}
    }
  }
  const bx=ballMesh.position.x,bz=ballMesh.position.z;
  if(Math.abs(bz)<3.66){
    if(bx<-53.8){goalScored(1);return;}
    if(bx>53.8){goalScored(0);return;}
  }
});

function goalScored(who){
  if(processingGoal)return;
  processingGoal=true;
  pSt[0].hasBall=false;pSt[1].hasBall=false;
  score[who]++;updateHUD();
  showGoal(()=>{resetAll();processingGoal=false;});
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  score=[0,0];timeLeft=120;updateHUD();resetAll();matchRunning=true;
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{
    if(!matchRunning)return;
    timeLeft--;updateHUD();
    if(timeLeft<=0){matchRunning=false;endMatch();}
  },1000);
});

function endMatch(){
  matchRunning=false;
  document.getElementById('ovtitle').textContent=
    score[0]>score[1]?'🔵 Home ניצח!':score[1]>score[0]?'🔴 Away ניצח!':'תיקו! 🤝';
  document.getElementById('overlay').querySelectorAll('.sub')[0].textContent=score[0]+' - '+score[1];
  document.getElementById('startBtn').textContent='שחק שוב';
  document.getElementById('overlay').style.display='flex';
}

// Load stadium from Google Drive
// Convert share link to direct download link
const fileId = '1Fv_oc-gJMs1gt9gG0Q6gwQqk9btsbIqw';
const glbUrl  = `https://drive.google.com/uc?export=download&id=${fileId}`;

const loadTxt  = document.getElementById('loadtxt');
const loadFill = document.getElementById('loadfill');

loadTxt.textContent = 'מתחבר לשרת...';
loadFill.style.width = '10%';

BABYLON.SceneLoader.ImportMesh("", "", glbUrl, scene,
  function(meshes){
    loadFill.style.width='100%';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('overlay').style.display='flex';
    },400);

    const root=meshes[0];
    scene.meshes.forEach(m=>{ try{m.refreshBoundingInfo&&m.refreshBoundingInfo();}catch(e){} });
    const bb=root.getHierarchyBoundingVectors(true);
    const size=bb.max.subtract(bb.min);
    const center=bb.min.add(size.scale(0.5));
    const scale=105/Math.max(size.x,size.z);
    root.scaling.setAll(scale);
    root.position.set(-center.x*scale,-bb.min.y*scale,-center.z*scale);

    resetAll();
  },
  function(evt){
    if(evt.lengthComputable){
      loadFill.style.width=(10+evt.loaded/evt.total*85)+'%';
      loadTxt.textContent='טוען אצטדיון... '+Math.round(evt.loaded/evt.total*100)+'%';
    }
  },
  function(scene,msg,ex){
    // Fallback: Google Drive blocks direct CORS — show helpful message
    loadTxt.textContent='❌ Google Drive חסום — פותח בלי אצטדיון';
    loadFill.style.width='100%';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('overlay').style.display='flex';
    },2000);
    console.warn("GLB load failed:",msg);
  }
);

resetAll();
engine.runRenderLoop(()=>scene.render());
window.addEventListener('resize',()=>engine.resize());
</script>
</body>
</html>
